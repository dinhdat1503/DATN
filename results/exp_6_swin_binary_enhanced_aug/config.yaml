# ============================================================
# EXP 6 — Swin-Tiny (Transformer) | Siamese nhị phân | Enhanced + Aug ★ (Swin SOTA)
# Swin + ảnh enhanced + MixUp & CutMix ĐỒNG BỘ song nhãn — pipeline đầy đủ nhất.
# ============================================================
experiment_name: exp_6_swin_binary_enhanced_aug
description: "EXP 6 — Swin Siamese nhị phân | Enhanced + MixUp + CutMix đồng bộ"
model_type: swin

splits_dir: archive/splits_clean
img_dir: archive/enhanced_images

model:
  pretrained: true
  dropout: 0.3

loss:
  focal_alpha: auto
  focal_gamma: 2.0
  lam_age: 0.05

training:
  img_size: 384
  batch_size: 8
  gradient_accumulation_steps: 2
  num_workers: 4
  epochs: 40
  early_stopping_patience: 10
  seed: 42
  age_min_filter: 5
  two_stage: true
  freeze_epochs: 5
  frozen_lr: 0.001
  unfrozen_lr: 0.0001
  weight_decay: 0.05
  eta_min: 0.000001

augmentation:
  use_mixup: true
  use_cutmix: true
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_6_swin_binary_enhanced_aug
  save_best_model: true
