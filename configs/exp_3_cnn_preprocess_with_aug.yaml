# ============================================================
# EXP 3 — Có tiền xử lý ảnh + MixUp + CutMix
# Pipeline tiền xử lý: ROI Crop → Ben Graham → CLAHE
# Xử lý mất cân bằng: pos_weight + MixUp (α=0.4) + CutMix (α=1.0)
# Mục tiêu: Đo đóng góp của MixUp/CutMix so với EXP 2
# ============================================================
experiment_name: exp_3_cnn_preprocess_with_aug
description: "EXP 3 — CNN | ROI+BenGraham+CLAHE + MixUp(α=0.4) + CutMix(α=1.0)"
model_type: cnn

splits_dir: archive/splits_clean
img_dir: archive/enhanced_images          # ← CÙNG ẢNH VỚI EXP 2

model:
  pretrained: true
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.02

training:
  img_size: 384
  batch_size: 16
  num_workers: 4
  epochs: 45
  early_stopping_patience: 8
  use_weighted_sampler: false

optimizer:
  name: AdamW
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: CosineAnnealingLR
  T_max: 45
  eta_min: 0.000001

# BẬT MixUp và CutMix — đây là biến thay đổi so với EXP 2
augmentation:
  use_mixup: true                        # ← BẬT (khác EXP 2)
  use_cutmix: true                       # ← BẬT (khác EXP 2)
  mixup_alpha: 0.4                       # α=0.4 (Zhang et al. 2018)
  mixup_prob: 0.5                        # 50% batch dùng MixUp
  cutmix_alpha: 1.0                      # α=1.0 (Yun et al. 2019)
  cutmix_prob: 0.5                       # 50% batch dùng CutMix

output:
  results_dir: results/exp_3_cnn_preprocess_with_aug
  save_best_model: true
