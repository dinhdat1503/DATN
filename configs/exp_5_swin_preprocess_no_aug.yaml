# ============================================================
# EXP 5 — Swin Transformer | Có tiền xử lý, không MixUp/CutMix
# So sánh với EXP 2 (CNN) → cùng dữ liệu, khác kiến trúc
# So sánh với EXP 4 (Swin) → cùng model, khác tiền xử lý
# ============================================================
experiment_name: exp_5_swin_preprocess_no_aug
description: "EXP 5 — Swin-Tiny | ROI+BenGraham+CLAHE, không MixUp/CutMix"
model_type: swin

splits_dir: archive/splits_clean
img_dir: archive/enhanced_images          # ← ẢNH ĐÃ TIỀN XỬ LÝ

model:
  pretrained: true
  variant: tiny
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.02

training:
  img_size: 224
  batch_size: 16
  num_workers: 4
  epochs: 20
  early_stopping_patience: 5

optimizer:
  name: AdamW
  lr: 0.0001
  weight_decay: 0.05

scheduler:
  name: CosineAnnealingLR
  T_max: 20
  eta_min: 0.000001

augmentation:
  use_mixup: false
  use_cutmix: false
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_5_swin_preprocess_no_aug
  save_best_model: true
