# ============================================================
# EXP 8 — Swin-Tiny | Phân loại Nhị phân (Normal vs Pathological)
# Dùng ảnh Enhanced + MixUp + CutMix
# ============================================================
experiment_name: exp_8_swin_binary
description: "EXP 8 — Swin-Tiny | Phân loại Nhị phân (Bình thường vs Có bệnh) + Dự đoán Tuổi"
model_type: swin
binary_mode: true

splits_dir: archive/splits_clean
img_dir: archive/preprocessed_images

model:
  pretrained: true
  variant: tiny
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  loss_type: bce
  lam: 0.02                                # Hạ lam xuống để cân bằng với task nhị phân

training:
  img_size: 224
  batch_size: 32
  num_workers: 4
  epochs: 20
  early_stopping_patience: 6
  use_weighted_sampler: false

optimizer:
  name: AdamW
  lr: 0.0003
  weight_decay: 0.05

scheduler:
  name: CosineAnnealingLR
  T_max: 20
  eta_min: 0.000001

augmentation:
  use_mixup: true
  use_cutmix: true
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_8_swin_binary
  save_best_model: true
