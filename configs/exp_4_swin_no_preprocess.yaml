# ============================================================
# EXP 4 — Swin Transformer | Ảnh gốc, chưa qua tiền xử lý
# So sánh với EXP 1 (CNN) → cùng dữ liệu, khác kiến trúc
# ============================================================
experiment_name: exp_4_swin_no_preprocess
description: "EXP 4 — Swin-Tiny | Ảnh gốc (không ROI, không CLAHE, không MixUp/CutMix)"
model_type: swin                           # ← Swin Transformer

splits_dir: archive/splits_clean
img_dir: archive/ODIR-5K/ODIR-5K/Training Images

model:
  pretrained: true
  variant: tiny                            # swin_tiny_patch4_window7_224
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.02

training:
  img_size: 224                            # Swin-Tiny dùng 224×224
  batch_size: 16                           # Nhỏ hơn vì Swin tốn nhiều VRAM hơn CNN
  num_workers: 4
  epochs: 20
  early_stopping_patience: 5

optimizer:
  name: AdamW
  lr: 0.0001                              # Swin cần lr nhỏ hơn EfficientNet
  weight_decay: 0.05                      # Swin dùng weight_decay lớn hơn theo paper

scheduler:
  name: CosineAnnealingLR
  T_max: 20
  eta_min: 0.000001

augmentation:
  use_mixup: false
  use_cutmix: false
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_4_swin_no_preprocess
  save_best_model: true
