# ============================================================
# EXP 1 — Ảnh gốc ODIR-5K, chưa qua bất kỳ tiền xử lý nào
# Mục tiêu: Baseline thấp nhất — model phải tự xử lý:
#   - Kích thước ảnh không đồng đều
#   - Viền đen lớn, nhiễu thiết bị
#   - Ánh sáng không chuẩn, contrast thấp
#   - Mất cân bằng nhãn KHÔNG được xử lý (chỉ dùng pos_weight)
# ============================================================
experiment_name: exp_1_cnn_no_preprocess
description: "EXP 1 — CNN | Ảnh gốc (không ROI, không CLAHE, không MixUp/CutMix)"
model_type: cnn                            # ← efficientnet_b0

splits_dir: archive/splits_clean
img_dir: archive/ODIR-5K/ODIR-5K/Training Images

model:
  pretrained: true
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.02

training:
  img_size: 224
  batch_size: 32
  num_workers: 4
  epochs: 20
  early_stopping_patience: 5

optimizer:
  name: AdamW
  lr: 0.0003
  weight_decay: 0.01

scheduler:
  name: CosineAnnealingLR
  T_max: 20
  eta_min: 0.000001

# Không dùng MixUp/CutMix
augmentation:
  use_mixup: false
  use_cutmix: false
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_1_cnn_no_preprocess
  save_best_model: true
