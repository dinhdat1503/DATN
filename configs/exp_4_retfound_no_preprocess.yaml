# ============================================================
# EXP 4 — RETFound | Ảnh gốc, chưa qua tiền xử lý
# So sánh với EXP 1 (CNN) → cùng dữ liệu, khác kiến trúc
# ============================================================
experiment_name: exp_4_retfound_no_preprocess
description: "EXP 4 — RETFound (ViT-Large) | Ảnh gốc (không ROI, không CLAHE, không MixUp/CutMix)"
model_type: retfound

splits_dir: archive/splits_clean
img_dir: archive/ODIR-5K/ODIR-5K/Training Images

model:
  pretrained: true
  pretrained_path: "pretrained_weights/RETFound_cfp_weights.pth"
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.1

training:
  img_size: 224
  batch_size: 8                           # ViT-Large khá nặng → Dùng Batch size 8 để tránh OOM
  num_workers: 4
  epochs: 45
  early_stopping_patience: 8
  use_weighted_sampler: false             # Không dùng Weighted Sampler cho EXP 4

optimizer:
  name: AdamW
  lr: 0.00001                             # Học suất nhỏ phù hợp fine-tuning RETFound
  weight_decay: 0.05

scheduler:
  name: CosineAnnealingLR
  T_max: 45
  eta_min: 0.0000001

augmentation:
  use_mixup: false
  use_cutmix: false
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_4_retfound_no_preprocess
  save_best_model: true
