# ============================================================
# EXP 6 — RETFound | Full Pipeline (tiền xử lý + MixUp/CutMix/WRS)
# So sánh với EXP 3 (CNN) → cùng dữ liệu + aug, khác kiến trúc
# So sánh với EXP 5 (RETFound) → cùng model, thêm MixUp/CutMix
# ============================================================
experiment_name: exp_6_retfound_preprocess_with_aug
description: "EXP 6 — RETFound (ViT-Large) | ROI+BenGraham+CLAHE + MixUp(α=0.4) + CutMix(α=1.0) + WRS"
model_type: retfound

splits_dir: archive/splits_clean
img_dir: archive/enhanced_images          # ← Ảnh đã tiền xử lý

model:
  pretrained: true
  pretrained_path: "pretrained_weights/RETFound_cfp_weights.pth"
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.1

training:
  img_size: 224
  batch_size: 8
  num_workers: 4
  epochs: 45
  early_stopping_patience: 8
  use_weighted_sampler: true              # Kích hoạt lấy mẫu cân bằng lớp

optimizer:
  name: AdamW
  lr: 0.00001
  weight_decay: 0.05

scheduler:
  name: CosineAnnealingLR
  T_max: 45
  eta_min: 0.0000001

augmentation:
  use_mixup: true
  use_cutmix: true
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_6_retfound_preprocess_with_aug
  save_best_model: true
