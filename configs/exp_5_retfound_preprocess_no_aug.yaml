# ============================================================
# EXP 5 — RETFound | Có tiền xử lý, không MixUp/CutMix
# So sánh với EXP 2 (CNN) → cùng dữ liệu, khác kiến trúc
# So sánh với EXP 4 (RETFound) → cùng model, khác tiền xử lý
# ============================================================
experiment_name: exp_5_retfound_preprocess_no_aug
description: "EXP 5 — RETFound (ViT-Large) | ROI+BenGraham+CLAHE, không MixUp/CutMix"
model_type: retfound

splits_dir: archive/splits_clean
img_dir: archive/enhanced_images          # ← Ảnh đã tiền xử lý

model:
  pretrained: true
  pretrained_path: "pretrained_weights/RETFound_cfp_weights.pth"
  freeze_backbone: false
  dropout_cls: 0.3
  dropout_reg: 0.2

loss:
  lam: 0.1

training:
  img_size: 224
  batch_size: 8
  num_workers: 4
  epochs: 45
  early_stopping_patience: 8
  use_weighted_sampler: false             # Không dùng Weighted Sampler cho EXP 5

optimizer:
  name: AdamW
  lr: 0.00001
  weight_decay: 0.05

scheduler:
  name: CosineAnnealingLR
  T_max: 45
  eta_min: 0.0000001

augmentation:
  use_mixup: false
  use_cutmix: false
  mixup_alpha: 0.4
  mixup_prob: 0.5
  cutmix_alpha: 1.0
  cutmix_prob: 0.5

output:
  results_dir: results/exp_5_retfound_preprocess_no_aug
  save_best_model: true
